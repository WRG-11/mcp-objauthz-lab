name: lab-integrity

# This lab is vulnerable BY DESIGN. CI does NOT assert "the code is secure" —
# it asserts the teaching artifact still works: deps install, every module
# parses, and the two-way gate holds (the vuln build reproduces the cross-tenant
# delete while the scoped sibling stays denied; the fixed build blocks it without
# over-blocking the same-tenant case). A green check = the lab demonstrates the
# bug and the fix exactly as the README documents. (No CodeQL: it would simply
# re-flag the intentionally planted BOLA.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  two-way-gate:
    name: two-way gate (vuln exploits, fix blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: install dependencies
        run: npm install --no-audit --no-fund
      - name: syntax check (all modules parse)
        run: |
          node --check src/server.js
          node --check src/auth.js
          node --check src/store.js
          node --check src/tools.js
          node --check poc/exploit.js
      - name: two-way gate (npm run poc — exit 0 = gate held)
        run: npm run poc
