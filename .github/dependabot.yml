version: 2
updates:
  # Runtime dependencies (the lab's own code is vulnerable BY DESIGN; its
  # dependencies should still stay current — supply-chain hygiene).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
  # Keep the CI actions current + SHA-resolvable.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
